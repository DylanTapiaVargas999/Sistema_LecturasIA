version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./LecturaIA.API
      dockerfile: Dockerfile
    container_name: lecturaIA-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    env_file:
      - ./LecturaIA.API/.env.production
    volumes:
      # Persistir las imágenes generadas por la IA
      - lectura-images:/app/wwwroot/images
    networks:
      - lecturaIA-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React
  frontend:
    build:
      context: ./LecturaIA.Frontend
      dockerfile: Dockerfile
    container_name: lecturaIA-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lecturaIA-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lecturaIA-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - lecturaIA-network

networks:
  lecturaIA-network:
    driver: bridge

volumes:
  lectura-images:
    driver: local
